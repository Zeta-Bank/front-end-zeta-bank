<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeta Bank - Cadastro</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <main id="app">
        <section class="auth-container">
            <div class="auth-card">
                <h1 class="brand">Zeta<span>Bank</span></h1>
                <p class="subtitle">Crie sua conta agora</p>
                
                <form id="register-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">Nome</label>
                            <input type="text" id="firstName" name="firstName" placeholder="Nome" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Sobrenome</label>
                            <input type="text" id="lastName" name="lastName" placeholder="Sobrenome" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                </form>
                
                <p class="auth-footer">
                    Já tem uma conta? <a href="index.html">Faça login</a>
                </p>
            </div>
        </section>
    </main>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
